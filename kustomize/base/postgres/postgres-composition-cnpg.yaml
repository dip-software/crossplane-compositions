apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: postgres-cnpg
  namespace: crossplane-system
  labels:
    provider: cnpg
    revision: "47"
spec:
  # Reference to the XRD
  compositeTypeRef:
    apiVersion: dip.io/v1alpha1
    kind: Postgres
  
  mode: Pipeline
  
  pipeline:
  # Render CNPG resources
  - step: render-resources
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $xr := .observed.composite.resource }}
          {{- $namespace := $xr.metadata.namespace }}
          {{- $name := $xr.metadata.name }}
          
          {{- /* T-Shirt Sizing Map */ -}}
          {{- $size := $xr.spec.database.size | default "small" }}
          
          {{- /* Restore Configuration */ -}}
          {{- $restoreIdentifier := "" }}
          {{- if $xr.spec.database.restore }}
            {{- $restoreIdentifier = $xr.spec.database.restore.sourceIdentifier }}
          {{- end }}
          
          {{- /* Identifier logic */ -}}
          {{- $existingIdentifier := $xr.spec.database.existingIdentifier | default "" }}
          {{- $dbIdentifier := $xr.spec.database.identifier | default "" }}
          {{- $targetIdentifier := $dbIdentifier }}
          {{- if $existingIdentifier }}
          {{- $targetIdentifier = $existingIdentifier }}
          {{- end }}
          
          {{- $dbAllocatedStorage := $xr.spec.database.allocatedStorage | default 20 }}
          {{- $dbStorageType := $xr.spec.database.storageType | default "gp3" }}
          {{- $dbMultiAz := $xr.spec.database.multiAz | default false }}
          {{- $databaseName := $xr.spec.database.databaseName | default "" }}


          {{- $dbMasterUsername := $xr.spec.database.masterUsername }}
          
          {{- /* Password Handling */ -}}
          {{- $dbMasterPasswordSecretName := "" }}
          {{- $dbMasterPasswordSecretKey := "password" }}
          {{- $generatedPassword := "" }}

          {{- if $xr.spec.database.masterPasswordSecretRef }}
             {{- $dbMasterPasswordSecretName = $xr.spec.database.masterPasswordSecretRef.name }}
             {{- $dbMasterPasswordSecretKey = $xr.spec.database.masterPasswordSecretRef.key | default "password" }}
          {{- else }}
             {{- $dbMasterPasswordSecretName = printf "%s-password" $name }}
             {{- /* Check if secret already exists to preserve password */ -}}
             {{- $observedResources := .observed.resources | default dict }}
             {{- $existingSecret := index $observedResources "password-secret" }}
             {{- if $existingSecret }}
               {{- $generatedPassword = index $existingSecret.resource.data "password" | b64dec }}
             {{- else }}
               {{- $generatedPassword = randAlphaNum 24 }}
             {{- end }}
          {{ end }} 
          
          {{- $dbMasterPasswordSecret := dict "name" $dbMasterPasswordSecretName "key" $dbMasterPasswordSecretKey }}
          {{- $dbPort := $xr.spec.database.port | default 5432 }}

          {{- /* Secret Name Logic */ -}}
          {{- $secretName := "" }}
          {{- if $xr.spec.writeConnectionSecretToRef }}
            {{- $secretName = $xr.spec.writeConnectionSecretToRef.name }}
          {{- end }}
          
          {{- /* CNPG Resource Calculation */ -}}
          {{- $cnpgCpuReq := "500m" }}
          {{- $cnpgCpuLim := "1000m" }}
          {{- $cnpgMemReq := "512Mi" }}
          {{- $cnpgMemLim := "1Gi" }}
          {{- if eq $size "medium" }}
            {{- $cnpgCpuReq = "2" }}
            {{- $cnpgCpuLim = "2" }}
            {{- $cnpgMemReq = "4Gi" }}
            {{- $cnpgMemLim = "4Gi" }}
          {{- else if eq $size "large" }}
            {{- $cnpgCpuReq = "4" }}
            {{- $cnpgCpuLim = "4" }}
            {{- $cnpgMemReq = "16Gi" }}
            {{- $cnpgMemLim = "16Gi" }}
          {{- end }}
          
          {{- $cnpgInstances := 2 }}
          {{- if $dbMultiAz }}
            {{- $cnpgInstances = 3 }}
          {{- end }}
          
          {{- /* Map AWS storage types to K8s StorageClasses (simplistic mapping) */ -}}
          {{- $cnpgStorageClass := "standard" }}
          {{- if eq $dbStorageType "gp3" }}
             {{- $cnpgStorageClass = "gp3-encrypted" }}
          {{- end }}
          {{- if eq $dbStorageType "io1" }}
             {{- $cnpgStorageClass = "io1" }}
          {{- end }}
          
          ---
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: {{ $targetIdentifier }}
            namespace: {{ $namespace }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: database
              crossplane.io/composition-resource-name: database
              crossplane.io/external-name: {{ $targetIdentifier }}
          spec:
            instances: {{ $cnpgInstances }}
            
            # Bootstrap configuration
            bootstrap:
              {{- if $restoreIdentifier }}
              recovery:
                backup:
                  name: {{ $restoreIdentifier }}
              {{- else }}
              initdb:
                database: {{ $databaseName | default "app" }}
                owner: {{ $dbMasterUsername | default "app" }}
                secret:
                  name: {{ $dbMasterPasswordSecret.name }}
              {{- end }}
            
            # Storage configuration
            storage:
              size: {{ $dbAllocatedStorage }}Gi
              storageClass: {{ $cnpgStorageClass }}
            
            # Resource Requirements
            resources:
              requests:
                memory: {{ $cnpgMemReq }}
                cpu: {{ $cnpgCpuReq }}
              limits:
                memory: {{ $cnpgMemLim }}
                cpu: {{ $cnpgCpuLim }}
          
          {{- if not $xr.spec.database.masterPasswordSecretRef }}
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ $dbMasterPasswordSecretName }}
            namespace: {{ $namespace }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: password-secret
          type: Opaque
          stringData:
             password: "{{ $generatedPassword }}"
          {{- end }}
          
          {{- if $secretName }}
            {{- $fqdn := printf "%s-rw.%s.svc" $targetIdentifier $namespace }}
          
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ $secretName }}
            namespace: {{ $namespace }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: connection-secret
              crossplane.io/composition-resource-name: connection-secret
          type: Opaque
          data:
            endpoint: {{ printf "%s:%d" $fqdn (int $dbPort) | b64enc }}
            host: {{ $fqdn | b64enc }}
            port: {{ printf "%d" (int $dbPort) | b64enc }}
            username: {{ $dbMasterUsername | default "app" | b64enc }}
            database: {{ $databaseName | default "app" | b64enc }}
            sslmode: {{ "require" | b64enc }}
            {{- if $generatedPassword }}
            password: {{ $generatedPassword | b64enc }}
            {{- end }}
          {{- end }}
  
  # Patch status fields
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: database
        patches:
        - type: ToCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: status.dbInstanceIdentifier
        - type: ToCompositeFieldPath
          fromFieldPath: status.writeService
          toFieldPath: status.dbEndpoint
        
        readinessChecks:
        # CNPG Readiness
        - type: MatchString
          fieldPath: status.phase
          matchString: "Cluster in healthy state"
                
        # Secret Readiness (Always Ready)

  
  # Auto-ready function
  - step: auto-ready
    functionRef:
      name: function-auto-ready
