apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: postgres-aws
  namespace: crossplane-system
spec:
  # Reference to the XRD
  compositeTypeRef:
    apiVersion: dip.io/v1alpha1
    kind: Postgres
  
  mode: Pipeline
  
  pipeline:
  # Load environment configurations for AWS region and VPC
  - step: load-environment-configs
    functionRef:
      name: function-environment-configs
    input:
      apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
      kind: Input
      spec:
        environmentConfigs:
        - type: Reference
          ref:
            name: hsp-addons
        - type: Selector
          selector:
            mode: Multiple
            matchLabels:
              - key: config
                type: Value
                value: dip-software
        - type: Selector
          selector:
            mode: Multiple
            matchLabels:
              - key: config
                type: Value
                value: hsp-addons
  
  # Render AWS resources using Go templating
  - step: render-resources
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{- $xr := .observed.composite.resource }}
          {{- $namespace := $xr.metadata.namespace }}
          {{- $name := $xr.metadata.name }}
          
          {{- $env := index .context "apiextensions.crossplane.io/environment" }}
          {{- $awsRegion := index $env "region" }}
          
          {{- /* Determine identifier: Use existingIdentifier if set (Import/Active Manage), else identifier (Create) */ -}}
          {{- $existingIdentifier := $xr.spec.database.existingIdentifier | default "" }}
          {{- $dbIdentifier := $xr.spec.database.identifier | default "" }}
          {{- $targetIdentifier := $dbIdentifier }}
          {{- if $existingIdentifier }}
          {{- $targetIdentifier = $existingIdentifier }}
          {{- end }}
          
          {{- $dbType := $xr.spec.database.type | default "rds-instance" }}
          {{- $dbEngine := $xr.spec.database.engine | default "postgres" }}
          {{- $dbPort := $xr.spec.database.port | default 5432 }}
          {{- $databaseName := $xr.spec.database.databaseName | default "" }}
          
          {{- /* Database Spec Variables */ -}}
          {{- $dbEngineVersion := $xr.spec.database.engineVersion | default "" }}
          {{- $dbInstanceClass := $xr.spec.database.instanceClass | default "" }}
          {{- $dbAllocatedStorage := $xr.spec.database.allocatedStorage | default 20 }}
          {{- $dbStorageType := $xr.spec.database.storageType | default "gp3" }}
          {{- $dbMasterUsername := $xr.spec.database.masterUsername }}
          {{- $dbMasterPasswordSecret := $xr.spec.database.masterPasswordSecretRef }}
          {{- $dbBackupRetention := $xr.spec.database.backupRetentionPeriod | default 7 }}
          {{- $dbMultiAz := $xr.spec.database.multiAz | default false }}
          {{- $dbPubliclyAccessible := $xr.spec.database.publiclyAccessible | default false }}
          {{- $dbStorageEncrypted := $xr.spec.database.storageEncrypted | default true }}
          {{- $dbSkipFinalSnapshot := $xr.spec.database.skipFinalSnapshot | default true }}
          {{- $deletionPolicy := $xr.spec.deletionPolicy | default "Delete" }}
          
          {{- /* Extract VPC configuration */ -}}
          {{- $servicesVpc := index $env "servicesVpc" | default dict }}
          {{- $securityGroups := index $servicesVpc "securityGroups" | default dict }}
          {{- $databaseSg := index $securityGroups "database" | default dict }}
          {{- $databaseSecurityGroupId := index $databaseSg "id" | default "" }}
          {{- $subnetGroups := index $servicesVpc "subnetGroups" | default dict }}
          {{- $databaseSubnetGroup := index $subnetGroups "database" | default dict }}
          {{- $databaseSubnetIds := index $databaseSubnetGroup "subnet_ids" | default list }}
          
          {{- $tags := dict }}
          {{- if $xr.spec.tags }}
          {{- range $key, $value := $xr.spec.tags }}
          {{- $_ := set $tags $key $value }}
          {{- end }}
          {{- end }}
          {{- $_ := set $tags "ManagedBy" "Crossplane" }}
          {{- $_ := set $tags "Namespace" $namespace }}
          {{- $_ := set $tags "CompositeResource" $name }}
          {{- $_ := set $tags "Database" $targetIdentifier }}
          
          {{- $providerConfigName := "default" }}
          {{- $providerConfigKind := "ProviderConfig" }}
          {{- if $xr.spec.providerConfigRef }}
          {{- if $xr.spec.providerConfigRef.name }}
          {{- $providerConfigName = $xr.spec.providerConfigRef.name }}
          {{- end }}
          {{- if $xr.spec.providerConfigRef.kind }}
          {{- $providerConfigKind = $xr.spec.providerConfigRef.kind }}
          {{- end }}
          {{- end }}
          
          {{- /* Create Subnet Group */ -}}
          ---
          apiVersion: rds.aws.m.upbound.io/v1beta1
          kind: SubnetGroup
          metadata:
            name: {{ $name }}-subnet-group
            namespace: {{ $namespace }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: rds-subnet-group
          spec:
            forProvider:
              region: {{ $awsRegion }}
              description: "Subnet group for {{ $name }} database"
              subnetIds:
                {{- range $databaseSubnetIds }}
                - {{ . }}
                {{- end }}
              tags:
                {{- range $key, $value := $tags }}
                {{ $key }}: {{ $value | quote }}
                {{- end }}
            providerConfigRef:
              name: {{ $providerConfigName }}
              kind: {{ $providerConfigKind }}
          
          {{- if eq $dbType "rds-instance" }}
          ---
          apiVersion: rds.aws.m.upbound.io/v1beta1
          kind: Instance
          metadata:
            name: {{ $name }}-rds-instance
            namespace: {{ $namespace }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: database
              crossplane.io/external-name: {{ $targetIdentifier }}
          spec:

            {{- if $existingIdentifier }}
            managementPolicies: ["Observe"]
            {{- end }}
            forProvider:
              identifier: {{ $targetIdentifier }}
              region: {{ $awsRegion }}
              engine: {{ $dbEngine }}
              {{- if $dbEngineVersion }}
              engineVersion: {{ $dbEngineVersion | quote }}
              {{- end }}
              instanceClass: {{ $dbInstanceClass }}
              allocatedStorage: {{ $dbAllocatedStorage }}
              storageType: {{ $dbStorageType }}
              storageEncrypted: {{ $dbStorageEncrypted }}
              {{- if $databaseName }}
              dbName: {{ $databaseName }}
              {{- end }}
              username: {{ $dbMasterUsername }}
              passwordSecretRef:
                name: {{ $dbMasterPasswordSecret.name }}
                key: {{ $dbMasterPasswordSecret.key | default "password" }}

              port: {{ $dbPort }}
              dbSubnetGroupNameRef:
                name: {{ $name }}-subnet-group
              vpcSecurityGroupIds:
                - {{ $databaseSecurityGroupId }}
              backupRetentionPeriod: {{ $dbBackupRetention }}
              multiAz: {{ $dbMultiAz }}
              publiclyAccessible: {{ $dbPubliclyAccessible }}
              iamDatabaseAuthenticationEnabled: false
              
              skipFinalSnapshot: {{ $dbSkipFinalSnapshot }}
              {{- if $tags }}
              tags:
                {{- range $key, $value := $tags }}
                {{ $key }}: {{ $value | quote }}
                {{- end }}
              {{- end }}
            providerConfigRef:
              name: {{ $providerConfigName }}
              kind: {{ $providerConfigKind }}
          
          {{- else if eq $dbType "aurora-cluster" }}
          ---
          apiVersion: rds.aws.m.upbound.io/v1beta1
          kind: Cluster
          metadata:
            name: {{ $name }}-rds-cluster
            namespace: {{ $namespace }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: database
              crossplane.io/external-name: {{ $targetIdentifier }}
          spec:

            {{- if $existingIdentifier }}
            managementPolicies: ["Observe"]
            {{- end }}
            forProvider:
              clusterIdentifier: {{ $targetIdentifier }}
              region: {{ $awsRegion }}
              engine: aurora-postgresql
              {{- if $dbEngineVersion }}
              engineVersion: {{ $dbEngineVersion | quote }}
              {{- end }}
              {{- if $databaseName }}
              databaseName: {{ $databaseName }}
              {{- end }}
              masterUsername: {{ $dbMasterUsername }}
              masterPasswordSecretRef:
                name: {{ $dbMasterPasswordSecret.name }}
                key: {{ $dbMasterPasswordSecret.key | default "password" }}

              dbSubnetGroupNameRef:
                name: {{ $name }}-subnet-group
              vpcSecurityGroupIds:
                - {{ $databaseSecurityGroupId }}
              backupRetentionPeriod: {{ $dbBackupRetention }}
              storageEncrypted: {{ $dbStorageEncrypted }}
              iamDatabaseAuthenticationEnabled: false
              skipFinalSnapshot: {{ $dbSkipFinalSnapshot }}
              {{- if $tags }}
              tags:
                {{- range $key, $value := $tags }}
                {{ $key }}: {{ $value | quote }}
                {{- end }}
              {{- end }}
            providerConfigRef:
              name: {{ $providerConfigName }}
              kind: {{ $providerConfigKind }}
          {{- end }}
  
  # Patch status fields
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: database
        patches:
        # DB Endpoint: Patch from address (Instance) or endpoint (Cluster)
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.address
          toFieldPath: status.dbEndpoint
          policy:
            fromFieldPath: Optional
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.endpoint
          toFieldPath: status.dbEndpoint
          policy:
            fromFieldPath: Optional
            
        # DB Port
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.port
          toFieldPath: status.dbPort
          policy:
            fromFieldPath: Optional
            
        # DB Resource ID: resourceId (Instance) or clusterResourceId (Cluster)
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.resourceId
          toFieldPath: status.dbResourceId
          policy:
            fromFieldPath: Optional
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.clusterResourceId
          toFieldPath: status.dbResourceId
          policy:
            fromFieldPath: Optional

        readinessChecks:
        - type: MatchString
          fieldPath: status.conditions[0].status
          matchString: "True"
  
  # Auto-ready function
  - step: auto-ready
    functionRef:
      name: function-auto-ready
