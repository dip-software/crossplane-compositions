apiVersion: dip.io/v1alpha1
kind: Postgres
metadata:
  name: custom-permissions-db
  namespace: myapp
spec:
  # ServiceAccount configuration for IRSA binding
  serviceAccount:
    name: myapp-custom-sa
  
  # Database configuration
  database:
    identifier: myapp-special-db
    type: rds-instance
    engine: postgres
    databaseName: special_db
    iamUsername: custom_user
    # Provide the resource ID directly for more precise IAM policy
    resourceId: db-CUSTOMRESOURCEID123
  
  # IAM permissions with additional actions
  permissions:
    allowConnect: true
    additionalActions:
      - "rds:DescribeDBInstances"
      - "rds:DescribeDBClusters"
  
  # Tags for IAM resources
  tags:
    Application: myapp
    Environment: production
    Team: platform
    CustomPermissions: "true"
