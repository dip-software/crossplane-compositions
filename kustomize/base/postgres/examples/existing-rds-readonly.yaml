apiVersion: dip.io/v1alpha1
kind: Postgres
metadata:
  name: analytics-readonly-db
  namespace: analytics
spec:
  # ServiceAccount configuration for IRSA binding
  serviceAccount:
    name: analytics-reader-sa
  
  # Database configuration - read-only access to production database
  database:
    identifier: production-main-db
    type: rds-instance
    engine: postgres
    databaseName: production
    port: 5432
    iamUsername: readonly_user
  
  # IAM permissions - read-only access
  permissions:
    allowConnect: true
  
  # Tags for IAM resources
  tags:
    Application: analytics
    Environment: production
    Team: data-analytics
    AccessLevel: readonly
