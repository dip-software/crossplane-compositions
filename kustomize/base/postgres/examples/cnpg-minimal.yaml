apiVersion: dip.io/v1alpha1
kind: Postgres
metadata:
  name: myapp-local-db
  namespace: default
spec:
  crossplane:
    writeConnectionSecretToRef:
      name: myapp-local-db-conn
    compositionSelector:
      matchLabels:
        provider: cnpg
  database:
    # Generic sizing
    size: small
    
    # Standard configuration
    identifier: myapp-local
    databaseName: app
    masterUsername: appuser
    masterPasswordSecretRef:
      name: myapp-db-secret
      key: password
    
    allocatedStorage: 20
    
    # HA
    multiAz: false
