apiVersion: dip.io/v1alpha1
kind: Postgres
metadata:
  name: myapp-local-db
  namespace: default
spec:
  writeConnectionSecretToRef:
    name: myapp-local-db-connection
    namespace: default
  compositionSelector:
    matchLabels:
      provider: cnpg
  database:
    # Generic sizing
    size: small
    
    # Standard configuration
    masterUsername: "postgres"
    identifier: myapp-local
    databaseName: app
    engineVersion: "18.1"
    allocatedStorage: 20
    
    # HA
    multiAz: false
