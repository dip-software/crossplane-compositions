# Example Kubernetes Secret for RDS Master Password
#
# IMPORTANT: In production, use a secure method to create and manage this secret:
# - AWS Secrets Manager with External Secrets Operator
# - Sealed Secrets
# - Vault
# - Other secure secret management solutions
#
# This example shows the basic structure needed by the Postgres composition.
#
# Create the secret before creating the Postgres resource:
#   kubectl create secret generic myapp-db-master-password \
#     --from-literal=password='YourSecurePassword123!' \
#     --namespace=myapp

apiVersion: v1
kind: Secret
metadata:
  name: myapp-db-master-password
  namespace: myapp
type: Opaque
stringData:
  password: "ChangeMe-SecurePassword123!"
  # The key 'password' is the default key name expected by the composition.
  # You can use a different key name by specifying it in:
  # spec.database.masterPasswordSecretRef.key
