apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: postgres.dip.io
spec:
  group: dip.io
  names:
    kind: Postgres
    plural: postgres
  # Namespace scope - compositions will be namespace-scoped
  scope: Namespaced
  
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              # Service Account configuration for IRSA binding
              serviceAccount:
                type: object
                description: "Kubernetes ServiceAccount configuration for IRSA binding"
                properties:
                  name:
                    type: string
                    description: "Name of the Kubernetes ServiceAccount to bind with IAM role for RDS access"
                    pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                    maxLength: 253
                required:
                - name
              
              # Database configuration
              database:
                type: object
                description: "RDS PostgreSQL database configuration"
                properties:
                  # Identifier for creating new database
                  identifier:
                    type: string
                    description: "Name for the new RDS instance or Aurora cluster to create (e.g., 'myapp-development-db'). Use this when provisioning a new database."
                  
                  # Identifier for existing database (determines mode)
                  existingIdentifier:
                    type: string
                    description: "RDS instance identifier or Aurora cluster identifier of an existing database to observe (e.g., 'myapp-production-db'). If provided, the composition will observe the existing database instead of creating a new one."
                  
                  # Database type (rds-instance or aurora-cluster)
                  type:
                    type: string
                    enum: ["rds-instance", "aurora-cluster"]
                    default: "rds-instance"
                    description: "Database type: rds-instance for RDS PostgreSQL instances, aurora-cluster for Aurora PostgreSQL clusters"
                  
                  # Database engine (postgres)
                  engine:
                    type: string
                    enum: ["postgres"]
                    default: "postgres"
                    description: "Database engine type (currently only postgres is supported)"
                  
                  # Engine version (for new databases)
                  engineVersion:
                    type: string
                    description: "PostgreSQL engine version (e.g., '15.5', '16.1'). Required when creating a new database."
                  
                  # Database name (optional - for connection string)
                  databaseName:
                    type: string
                    description: "Database name for application connections. When creating a new database, this is the initial database name."
                  
                  # Port (optional - defaults to 5432 for postgres)
                  port:
                    type: integer
                    default: 5432
                    description: "Database port (defaults to 5432 for PostgreSQL)"
                  
                  # Database resource ID for IAM policy (for existing databases only)
                  resourceId:
                    type: string
                    description: "RDS resource ID (e.g., 'db-ABCDEFGHIJKLMNOP123456'). Only needed when using existingIdentifier if not auto-detected."
                  
                  # Instance class (for new databases)
                  instanceClass:
                    type: string
                    description: "RDS instance class (e.g., 'db.t3.micro', 'db.t3.small', 'db.r6g.large'). Required when creating a new database."
                  
                  # Allocated storage in GB (for new databases)
                  allocatedStorage:
                    type: integer
                    description: "Allocated storage in GB (minimum 20 for PostgreSQL). Required when creating a new database."
                    minimum: 20
                  
                  # Storage type (for new databases)
                  storageType:
                    type: string
                    enum: ["gp2", "gp3", "io1"]
                    default: "gp3"
                    description: "Storage type: gp2 (general purpose SSD), gp3 (newer general purpose SSD), io1 (provisioned IOPS)"
                  
                  # Master username (for new databases)
                  masterUsername:
                    type: string
                    description: "Master username for the database. Required when creating a new database. Note: This is different from iamUsername."
                    pattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
                    maxLength: 63
                  
                  # Master password secret reference (for new databases)
                  masterPasswordSecretRef:
                    type: object
                    description: "Reference to a Kubernetes secret containing the master password. Required when creating a new database."
                    properties:
                      name:
                        type: string
                        description: "Name of the secret"
                      namespace:
                        type: string
                        description: "Namespace of the secret (defaults to same namespace as Postgres resource)"
                      key:
                        type: string
                        default: "password"
                        description: "Key in the secret containing the password"
                    required:
                    - name
                  
                  # Backup configuration (for new databases)
                  backupRetentionPeriod:
                    type: integer
                    default: 7
                    description: "Number of days to retain automated backups (0-35). Default: 7 days"
                    minimum: 0
                    maximum: 35
                  
                  # Multi-AZ deployment (for new databases)
                  multiAz:
                    type: boolean
                    default: false
                    description: "Enable Multi-AZ deployment for high availability"
                  
                  # Public accessibility (for new databases)
                  publiclyAccessible:
                    type: boolean
                    default: false
                    description: "Make the database publicly accessible (not recommended for production)"
                  
                  # Encryption at rest (for new databases)
                  storageEncrypted:
                    type: boolean
                    default: true
                    description: "Enable storage encryption at rest"
                  
                  # Database username for IAM authentication
                  iamUsername:
                    type: string
                    description: "PostgreSQL username for IAM authentication (must be created in the database with IAM auth enabled)"
                    pattern: '^[a-zA-Z][a-zA-Z0-9_]*$'
                    maxLength: 63
                
                required:
                - iamUsername
              
              # IAM permissions configuration
              permissions:
                type: object
                description: "IAM permissions configuration"
                properties:
                  # Allow connect via IAM auth
                  allowConnect:
                    type: boolean
                    description: "Allow RDS IAM database authentication (rds-db:connect action)"
                    default: true
                  
                  # Additional RDS IAM actions
                  additionalActions:
                    type: array
                    description: "Additional RDS/IAM actions to include in the policy"
                    items:
                      type: string
              
              # Optional: Tags for created resources
              tags:
                type: object
                description: "Tags to apply to created AWS resources (IAM role and policy)"
                x-kubernetes-preserve-unknown-fields: true
              
              # Optional: Provider configuration override
              providerConfigRef:
                type: object
                description: "Optional: Override the default provider config reference"
                properties:
                  name:
                    type: string
                    description: "Name of the ProviderConfig"
                    default: "default"
                  kind:
                    type: string
                    description: "Kind of the ProviderConfig (e.g., ClusterProviderConfig, ProviderConfig)"
                    default: "ClusterProviderConfig"
              
              # Optional: Connection secret reference
              writeConnectionSecretToRef:
                type: object
                description: "Optional: Write connection details (endpoint, port, database, username) to a Kubernetes secret in the same namespace"
                properties:
                  name:
                    type: string
                    description: "Name of the secret to write connection details to"
                required:
                - name
            
            required:
            - serviceAccount
            - database
          
          status:
            type: object
            properties:
              dbInstanceIdentifier:
                type: string
                description: "RDS instance or Aurora cluster identifier"
              dbResourceId:
                type: string
                description: "RDS resource ID used in IAM policy"
              dbEndpoint:
                type: string
                description: "Database endpoint hostname"
              dbPort:
                type: integer
                description: "Database port"
              databaseName:
                type: string
                description: "Database name"
              roleArn:
                type: string
                description: "ARN of the IAM role created for IRSA"
              accountId:
                type: string
                description: "AWS Account ID"
              iamUsername:
                type: string
                description: "IAM database username"
              connectionString:
                type: string
                description: "PostgreSQL connection string (without password - use IAM auth token)"
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
